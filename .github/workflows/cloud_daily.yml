name: Ekaiva Daily Stocks
 
on:
  schedule:
    - cron: "30 11 * * 1-5"     # 11:30 UTC = 5:00 PM IST, Mon-Fri
  workflow_dispatch:             # lets you run it by hand from the Actions tab
 
permissions:
  contents: write
 
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance pandas openpyxl pyarrow
      - run: python ekaiva_stock_tracker.py
      - name: Save results back to the repo
        run: |
          git config user.name  "ekaiva-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Daily update $(date -u +%F)" || echo "no changes"
          git push || echo "push skipped"
 
